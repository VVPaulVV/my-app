name: EAS Update
on:
  push:
    branches: [master]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: npm install
      - name: Publish update
        run: CI=1 npx eas-cli update --branch development --message "auto update"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
